kind = "web"
previewPath = "/"
title = "AMTS Pro"
version = "1.0.0"
id = "artifacts/amts-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22003

[services.development]
run = "pnpm --filter @workspace/amts-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/amts-pro", "run", "build" ]
publicDir = "artifacts/amts-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22003"
BASE_PATH = "/"
